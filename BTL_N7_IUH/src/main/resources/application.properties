spring.application.name=BTL_N7_IUH

# =================================================================
# 1. C?U HÃNH SERVER & VIEW (JSP)
# =================================================================
server.port=8080

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# =================================================================
# 2. C?U HÃNH K?T N?I MARIA DB
# =================================================================
spring.datasource.url=jdbc:mariadb://localhost:3307/frubana_db
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# =================================================================
# 3. C?U HÃNH JPA/HIBERNATE
# =================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# =================================================================
# 4. C?U HÃNH EMAIL (JAVAMAIL)
# =================================================================
spring.mail.host=smtp.gmail.com 
spring.mail.port=587
spring.mail.username=your_email@gmail.com 
spring.mail.password=your_app_password 
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# =================================================================
# 5. C?U HÃNH KH¡C (VNPAY - N?U C” DŸNG)
# =================================================================
vnpay.tmnCode=YOUR_TMN_CODE
vnpay.hashSecret=YOUR_HASH_SECRET
vnpay.url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.returnUrl=http://localhost:8080/vnpay_return
